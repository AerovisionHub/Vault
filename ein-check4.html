async function run() {
  const out = document.getElementById('out');
  out.innerHTML = '<div style="color:#fbbf24;font-size:12px;margin-bottom:12px;">Verifying ' + BHC_MAP.length + ' CIKs against SEC EDGAR…</div>';
  
  let passed = 0, failed = 0, results = [];
  
  for (const [name, rssd, cik] of BHC_MAP) {
    try {
      const d = await fetch(`https://data.sec.gov/submissions/CIK${cik}.json`).then(r=>r.json());
      const ok = !d.error && d.ein;
      if (ok) passed++;
      else failed++;
      results.push({ name, rssd, cik, actualName: d.name, ein: d.ein, tickers: d.tickers?.join(','), ok });
    } catch(e) {
      failed++;
      results.push({ name, rssd, cik, ok: false, error: e.message });
    }
  }
  
  out.innerHTML = `<h3>${passed}/${BHC_MAP.length} CIKs verified ✓ · ${failed} failed</h3>`;
  results.forEach(r => {
    const nameMatch = r.actualName?.toLowerCase().includes(r.name.split(' ')[0].toLowerCase());
    out.innerHTML += `<div class="r ${r.ok ? 'ok' : 'err'}">
      ${r.ok ? '✓' : '✗'} ${r.name} | RSSD: ${r.rssd} | CIK: ${r.cik} | EIN: ${r.ein||'—'} | EDGAR name: ${r.actualName||'ERROR'} | Tickers: ${r.tickers||'—'}
    </div>`;
  });
}
