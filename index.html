<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Bank & Credit Union Explorer</title>
<meta name="description" content="Free financial intelligence on every U.S. bank and credit union. Search assets, deposits, capital ratios, ROA/ROE, and peer benchmarks. No login. No paywall.">
<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
<meta name="keywords" content="bank financial data, credit union intelligence, FDIC data, NCUA data, community bank assets, credit union members, ROA ROE banking">
<link rel="canonical" href="https://vaultbot.ai" id="canonical-tag">
<script>
// SEO: set correct meta synchronously before first paint
(function() {
  var path = location.pathname;
  var meta = {
    '/industry': {
      title: 'U.S. Banking Industry Analytics — Vault',
      desc:  'Fifty years of FDIC data: new bank charters, failures, branch concentration, and deposit trends. Free industry intelligence from Vault by iDENTIFY.',
      url:   'https://vaultbot.ai/industry'
    },
    '/about': {
      title: 'About Vault — Built with AI by iDENTIFY',
      desc:  'Vault was built entirely with Claude AI. Free bank and credit union intelligence powered by FDIC BankFind and NCUA public data. No login, no paywall.',
      url:   'https://vaultbot.ai/about'
    }
  };
  var m = meta[path];
  if (m) {
    document.title = m.title;
    document.getElementById('canonical-tag').href = m.url;
    var desc = document.querySelector('meta[name="description"]');
    if (desc) desc.content = m.desc;
    var ogTitle = document.querySelector('meta[property="og:title"]');
    if (ogTitle) ogTitle.content = m.title;
    var ogDesc = document.querySelector('meta[property="og:description"]');
    if (ogDesc) ogDesc.content = m.desc;
    var ogUrl = document.querySelector('meta[property="og:url"]');
    if (ogUrl) ogUrl.content = m.url;
    var twTitle = document.querySelector('meta[name="twitter:title"]');
    if (twTitle) twTitle.content = m.title;
    var twDesc = document.querySelector('meta[name="twitter:description"]');
    if (twDesc) twDesc.content = m.desc;
  }
})();
</script>

<style>
  :root {
    --bg: #0f1240;
    --surface: rgba(255,255,255,0.07);
    --surface2: rgba(255,255,255,0.12);
    --border: rgba(255,255,255,0.15);
    --accent: #4db8ff;
    --accent-dim: rgba(77,184,255,0.15);
    --accent-glow: rgba(77,184,255,0.35);
    --accent2: #b06ef3;
    --text: #ffffff;
    --muted: rgba(255,255,255,0.65);
    --red: #ff6b6b;
    --yellow: #fbbf24;
    --blue: #7dd3fc;
    --serif: 'DM Serif Display', Georgia, serif;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(135deg, #0f1240 0%, #1a1060 30%, #2d1080 60%, #1a0a5e 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
    padding-bottom: 72px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 600px;
    background: radial-gradient(ellipse at center, rgba(77,184,255,0.08) 0%, rgba(176,110,243,0.06) 50%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    border-bottom: 1px solid rgba(255,255,255,0.12);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(15,18,64,0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .logo { font-family: var(--serif); font-size: 28px; letter-spacing: -0.5px; color: var(--text); }
  .logo span { color: #3b82f6; }
  .tagline { font-size: 12px; color: var(--muted); font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; }

  .data-badge { display: flex; gap: 8px; align-items: center; }
  .badge { font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; }
  .badge-fdic { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
  .badge-ncua { background: rgba(139,92,246,0.12); color: var(--accent2); border: 1px solid rgba(139,92,246,0.25); }

  .container { max-width: 1100px; margin: 0 auto; padding: 48px 40px; }
  .search-section { margin-bottom: 48px; }

  .search-heading { font-family: var(--serif); font-size: 42px; line-height: 1.15; margin-bottom: 8px; letter-spacing: -0.5px; }
  .search-heading em { background: linear-gradient(135deg, #4db8ff, #b06ef3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-style: italic; }
  .search-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; font-family: var(--mono); }

  .search-row { display: flex; gap: 12px; align-items: stretch; }
  .type-toggle { display: flex; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; overflow: hidden; height: 44px; backdrop-filter: blur(8px); }
  .type-btn { padding: 0 20px; height: 44px; background: none; border: none; color: var(--muted); font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; white-space: nowrap; border-right: 1px solid var(--border); }
  .type-btn:last-child { border-right: none; }
  .type-btn.active { background: rgba(59,130,246,0.15); color: var(--blue); }
  .type-btn:hover:not(.active) { background: rgba(255,255,255,0.04); color: var(--text); }

  .search-input-wrap { flex: 1; position: relative; }
  .search-input { width: 100%; height: 44px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 0 20px; color: var(--text); font-family: var(--sans); font-size: 16px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; backdrop-filter: blur(8px); }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .search-input::placeholder { color: rgba(255,255,255,0.45); }

  .search-btn { height: 44px; padding: 0 28px; background: linear-gradient(135deg, #4db8ff, #7c3aed); border: none; border-radius: 10px; color: #fff; font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .search-btn:hover { opacity: 0.88; }
  .search-btn:active { transform: scale(0.98); }
  .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .results-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
  .result-item { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: border-color 0.2s, background 0.2s; backdrop-filter: blur(8px); }
  .result-item:hover { border-color: var(--accent); background: rgba(77,184,255,0.12); }
  .result-name { font-weight: 600; font-size: 15px; }
  .result-meta { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 2px; }
  .result-assets { font-family: var(--mono); font-size: 13px; color: var(--blue); text-align: right; }
  .result-type { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  .inst-header { margin-bottom: 40px; padding-bottom: 32px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; }
  .inst-name { font-family: var(--serif); font-size: 36px; letter-spacing: -0.5px; line-height: 1.1; margin-bottom: 8px; }
  .inst-meta-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .inst-meta-item { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .inst-meta-item strong { color: var(--text); font-weight: 500; }

  .back-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: rgba(255,255,255,0.7); font-family: var(--mono); font-size: 12px; padding: 8px 16px; cursor: pointer; transition: all 0.2s; white-space: nowrap; letter-spacing: 0.04em; backdrop-filter: blur(8px); }
  .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.12); }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 40px; }
  .kpi-card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; backdrop-filter: blur(10px); }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #4db8ff, #b06ef3); opacity: 0.9; }
  .kpi-label { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .kpi-value { font-family: var(--serif); font-size: 26px; letter-spacing: -0.5px; line-height: 1; margin-bottom: 4px; }
  .kpi-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .kpi-positive { color: var(--accent); }
  .kpi-negative { color: var(--red); }
  .kpi-neutral { color: var(--text); }

  .section { margin-bottom: 40px; }
  .section-title { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.15); }

  .data-table { width: 100%; border-collapse: collapse; }
  .data-table tr { border-bottom: 1px solid var(--border); }
  .data-table tr:last-child { border-bottom: none; }
  .data-table td { padding: 12px 16px; font-size: 14px; }
  .data-table td:first-child { color: var(--muted); font-family: var(--mono); font-size: 12px; width: 45%; }
  .data-table td:last-child { text-align: right; font-family: var(--mono); font-size: 13px; font-weight: 500; }
  .data-table tr:nth-child(even) td { background: rgba(255,255,255,0.04); }

  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .dot-green { background: #3b82f6; box-shadow: 0 0 6px rgba(59,130,246,0.5); }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--yellow); }

  .state-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-family: var(--mono); font-size: 13px; }
  .state-msg .big { font-family: var(--serif); font-size: 48px; display: block; margin-bottom: 12px; color: var(--border); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .narrative-box { background: rgba(77,184,255,0.08); border: 1px solid rgba(77,184,255,0.25); border-left: 3px solid #4db8ff; border-radius: 0 12px 12px 0; padding: 24px; font-size: 14px; line-height: 1.8; color: var(--text); font-style: italic; margin-bottom: 40px; backdrop-filter: blur(10px); }

  /* Peer Comparison */
  .peers-section { margin-bottom: 40px; }
  .peers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .peer-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 18px; cursor: pointer; transition: border-color 0.2s, transform 0.15s, background 0.2s; position: relative; overflow: hidden; backdrop-filter: blur(8px); }
  .peer-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #b06ef3, #4db8ff); opacity: 0.9; }
  .peer-card:hover { border-color: #b06ef3; background: rgba(176,110,243,0.12); transform: translateY(-2px); }
  .peer-name { font-weight: 600; font-size: 13px; margin-bottom: 6px; line-height: 1.3; }
  .peer-location { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .peer-stats { display: flex; flex-direction: column; gap: 5px; }
  .peer-stat { display: flex; justify-content: space-between; align-items: center; }
  .peer-stat-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .peer-stat-value { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--blue); }
  .peer-loading { display: flex; align-items: center; gap: 10px; color: var(--muted); font-family: var(--mono); font-size: 12px; padding: 20px 0; }
  .peer-badge { display: inline-block; font-family: var(--mono); font-size: 9px; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; background: rgba(139,92,246,0.15); color: var(--accent2); border: 1px solid rgba(139,92,246,0.25); }
  .peer-you-badge { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.25); }
  .compare-bar-wrap { margin-top: 8px; }
  .compare-bar-label { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  .compare-bar-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .compare-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #4db8ff, #b06ef3); transition: width 0.6s ease; }

  /* Homepage */
  .home-section { margin-top: 72px; }
  .home-section-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .home-section-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.15); }
  .workflow-grid { display: grid; grid-template-columns: 1fr 40px 1fr 40px 1fr; gap: 0; align-items: start; margin-bottom: 8px; }
  .workflow-step { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 28px; position: relative; transition: border-color 0.2s, transform 0.2s; backdrop-filter: blur(10px); }
  .workflow-step:hover { border-color: var(--accent); transform: translateY(-2px); background: rgba(77,184,255,0.1); }
  .workflow-step-num { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .workflow-step-num::before { content: ''; display: inline-block; width: 24px; height: 24px; border-radius: 50%; background: var(--accent-dim); border: 1px solid rgba(59,130,246,0.3); }
  .workflow-icon { font-size: 28px; margin-bottom: 14px; display: block; }
  .workflow-title { font-family: var(--serif); font-size: 20px; color: var(--text); margin-bottom: 8px; line-height: 1.2; }
  .workflow-desc { font-size: 13px; color: var(--muted); line-height: 1.65; }
  .workflow-arrow { display: flex; align-items: center; justify-content: center; padding-top: 60px; color: var(--border); font-size: 22px; }
  .workflow-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
  .workflow-tag { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 4px; background: rgba(59,130,246,0.08); color: var(--muted); border: 1px solid var(--border); letter-spacing: 0.04em; }

  .home-news-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .home-news-item { display: flex; flex-direction: column; gap: 6px; padding: 16px 18px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; text-decoration: none; transition: border-color 0.2s, background 0.2s; cursor: pointer; backdrop-filter: blur(8px); }
  .home-news-item:hover { border-color: rgba(77,184,255,0.4); background: rgba(77,184,255,0.1); }
  .home-news-title { color: var(--text); font-size: 13px; font-weight: 500; line-height: 1.4; }
  .home-news-meta { display: flex; gap: 10px; font-family: var(--mono); font-size: 10px; color: var(--muted); align-items: center; }
  .home-news-source { color: var(--accent); }
  .home-news-loading { grid-column: 1 / -1; display: flex; align-items: center; gap: 10px; color: var(--muted); font-family: var(--mono); font-size: 12px; padding: 20px 0; }
  .home-stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 48px; margin-bottom: 72px; }
  .home-stat { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 20px; text-align: center; backdrop-filter: blur(10px); }
  .home-stat-value { font-family: var(--serif); font-size: 32px; color: var(--accent); line-height: 1; margin-bottom: 6px; }
  .home-stat-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

  /* News section */
  .news-section { margin-top: 48px; }
  .news-section h2 { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .news-list { display: flex; flex-direction: column; gap: 12px; }
  .news-item { display: flex; flex-direction: column; gap: 4px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; text-decoration: none; transition: border-color 0.2s, background 0.2s; }
  .news-item:hover { border-color: var(--accent); background: var(--surface2); }
  .news-title { color: var(--text); font-size: 14px; font-weight: 500; line-height: 1.4; }
  .news-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); display: flex; gap: 12px; }
  .news-source { color: var(--accent); }
  .news-empty { color: var(--muted); font-size: 13px; font-family: var(--mono); padding: 16px 0; }

  /* AI Build Report */
  .about-ai-report { margin: 0 0 20px; }
  .ai-report-header { margin-bottom: 32px; }
  .ai-report-eyebrow { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 12px; }

<script>
const FDIC_BASE = 'https://banks.data.fdic.gov/api';
const NCUA_BASE = 'https://data.ncua.gov/api';

// ── helpers ──────────────────────────────────────────────────────────────────

function fmt$(n) {
  if (n === null || n === undefined || n === '') return '—';
  const v = Number(n);
  if (isNaN(v)) return '—';
  if (Math.abs(v) >= 1e9) return '$' + (v/1e9).toFixed(2) + 'B';
  if (Math.abs(v) >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
  if (Math.abs(v) >= 1e3) return '$' + (v/1e3).toFixed(0) + 'K';
  return '$' + v.toFixed(0);
}

function fmtPct(n) {
  if (n === null || n === undefined || n === '') return '—';
  return Number(n).toFixed(2) + '%';
}

function fmtNum(n) {
  if (n === null || n === undefined || n === '') return '—';
  return Number(n).toLocaleString();
}

function thousands(n) {
  // FDIC reports in $thousands
  return Number(n) * 1000;
}

// ── FDIC API ─────────────────────────────────────────────────────────────────

// Fuzzy search helper: score how well a name matches a query
function fuzzyScore(name, query) {
  const n = name.toLowerCase().replace(/^the\s+/, ''); // strip leading "The"
  const q = query.toLowerCase().trim().replace(/^the\s+/, '');
  if (n === q) return 100;
  if (n.startsWith(q)) return 90;
  if (n.includes(q)) return 80;
  // Acronym match: "MSUFCU" matches "Michigan State University Federal Credit Union"
  const words = n.replace(/[^a-z0-9 ]/g, '').split(/\s+/);
  const acronym = words.map(w => w[0]).join('');
  if (acronym.includes(q.toLowerCase())) return 75;
  if (acronym.startsWith(q.toLowerCase())) return 85;
  // Token match: all query words appear somewhere in name
  const qTokens = q.split(/\s+/);
  if (qTokens.every(t => n.includes(t))) return 70;
  // Partial token match
  const matchCount = qTokens.filter(t => n.includes(t)).length;
  return Math.round((matchCount / qTokens.length) * 60);
}

async function searchFDIC(query) {
  const fields = 'NAME,CERT,CITY,STALP,ASSET,REPDTE,ACTIVE,INSTCAT';
  const q = query.trim();
  const qNoThe = q.replace(/^the\s+/i, ''); // strip leading "The" for broader match

  // Run three searches in parallel: wildcard, full-text, and "The"-prefixed wildcard
  const tokens      = qNoThe.split(/\s+/).map(w => `NAME:${w}*`).join('%20AND%20');
  const theTokens   = `The%20${qNoThe.split(/\s+/).map(w => `NAME:${encodeURIComponent(w)}*`).join('%20AND%20')}`;
  const wildcardUrl  = `${FDIC_BASE}/institutions?filters=${tokens}%20AND%20ACTIVE%3A1&fields=${fields}&limit=20&sort_by=ASSET&sort_order=DESC`;
  const theUrl       = `${FDIC_BASE}/institutions?filters=NAME%3AThe*${encodeURIComponent(qNoThe.split(/\s+/)[0])}*%20AND%20ACTIVE%3A1&fields=${fields}&limit=20&sort_by=ASSET&sort_order=DESC`;
  const fulltextUrl  = `${FDIC_BASE}/institutions?search=${encodeURIComponent(q)}&fields=${fields}&limit=20&sort_by=ASSET&sort_order=DESC&filters=ACTIVE%3A1`;

  const [r1, r2, r3] = await Promise.allSettled([fetch(wildcardUrl), fetch(fulltextUrl), fetch(theUrl)]);
  
  const results1 = r1.status === 'fulfilled' ? (await r1.value.json()).data || [] : [];
  const results2 = r2.status === 'fulfilled' ? (await r2.value.json()).data || [] : [];
  const results3 = r3.status === 'fulfilled' ? (await r3.value.json()).data || [] : [];
  
  // Merge and deduplicate by CERT, prefer higher fuzzy score
  const seen = new Map();
  [...results1, ...results2, ...results3].forEach(d => {
    const cert = d.data.CERT;
    const score = fuzzyScore(d.data.NAME, q);
    if (!seen.has(cert) || seen.get(cert).score < score) {
      seen.set(cert, { ...d, score });
    }
  });
  
  // If still empty, try single first-word wildcard fallback
  if (seen.size === 0) {
    const firstWord = qNoThe.split(/\s+/)[0];
    const fallbackUrl = `${FDIC_BASE}/institutions?filters=NAME%3A${firstWord}*%20AND%20ACTIVE%3A1&fields=${fields}&limit=20&sort_by=ASSET&sort_order=DESC`;
    const r4 = await fetch(fallbackUrl);
    const data4 = await r4.json();
    (data4.data || []).forEach(d => seen.set(d.data.CERT, { ...d, score: fuzzyScore(d.data.NAME, q) }));
  }
  }

  return [...seen.values()]
    .sort((a, b) => b.score - a.score || (b.data.ASSET || 0) - (a.data.ASSET || 0))
    .map(d => ({
      type: 'bank',
      id: d.data.CERT,
      name: d.data.NAME,
      city: d.data.CITY,
      state: d.data.STALP,
      assets: thousands(d.data.ASSET),
      reportDate: d.data.REPDTE,
      cert: d.data.CERT,
    }));
}

// ── NCUA API ─────────────────────────────────────────────────────────────────
// NCUA migrated from data.ncua.gov to mapping.ncua.gov.
// The new API is POST-based but does NOT send CORS headers, so browser-side
// calls from a different origin get an empty results array.
// Strategy: POST to the new endpoint; if results array is empty but
// totalResultCount > 0 (CORS blocked body), fall back to the NCUA locator link.
// We also cache a charter→name map from the search page DOM if possible.

async function searchNCUA(query) {
  // Use our Netlify Edge Function proxy at /api/ncua — bypasses NCUA CORS restriction
  try {
    // Acronym expansion: if query is all-caps 4-8 chars (e.g. "MSUFCU"), try common expansions
    // Common CU suffix words map to full terms
    const acronymMap = { 'FCU':'Federal Credit Union','CU':'Credit Union','ECU':'Employees Credit Union','TCU':'Teachers Credit Union','SCU':'School Credit Union' };
    let searchQuery = query;
    const isAcronym = /^[A-Z0-9]{3,10}$/.test(query.trim());
    if (isAcronym) {
      // Try to expand known suffixes to broaden the search
      const q = query.trim();
      // Strip common CU suffixes and search for the prefix words
      // e.g. MSUFCU → MSU → "Michigan State University" via initials
      // Send the acronym as-is AND run a parallel search on just the prefix
      const suffix = Object.keys(acronymMap).find(s => q.endsWith(s));
      const prefix = suffix ? q.slice(0, -suffix.length) : q;
      if (prefix && prefix !== q) {
        // Run two searches: exact acronym + prefix initials expansion
        const [r1, r2] = await Promise.allSettled([
          fetch(`/.netlify/functions/ncua?q=${encodeURIComponent(q)}&limit=10`),
          fetch(`/.netlify/functions/ncua?q=${encodeURIComponent(prefix)}&limit=15`)
        ]);
        const d1 = r1.status === 'fulfilled' ? (await r1.value.json()).results || [] : [];
        const d2 = r2.status === 'fulfilled' ? (await r2.value.json()).results || [] : [];
        // Merge, deduplicate, score
        const seen = new Map();
        [...d1, ...d2].forEach(d => {
          if (!seen.has(d.id) || fuzzyScore(d.name, query) > fuzzyScore(seen.get(d.id).name, query)) {
            seen.set(d.id, d);
          }
        });
        const merged = [...seen.values()]
          .map(d => ({ ...d, _score: fuzzyScore(d.name || '', query) }))
          .sort((a, b) => b._score - a._score);
        if (merged.length > 0) {
          return merged.map(d => ({ type: 'cu', id: d.id, name: d.name, city: d.city, state: d.state, assets: d.assets, members: d.members, cuType: d.type }));
        }
      }
    }
    const url = `/.netlify/functions/ncua?q=${encodeURIComponent(searchQuery)}&limit=20`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`Proxy returned ${r.status}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    return (data.results || [])
      .map(d => ({ ...d, _score: fuzzyScore(d.name || '', query) }))
      .sort((a, b) => b._score - a._score)
      .map(d => ({
        type: 'cu',
        id: d.id,
        name: d.name,
        city: d.city,
        state: d.state,
        assets: d.assets,
        members: d.members,
        cuType: d.type,
      }));
  } catch(e) {
    console.warn('NCUA proxy error:', e.message);
    // Graceful fallback card
    return [{
      type: 'cu', id: null,
      name: `"${query}" — Credit Union Search`,
      city: '—', state: '—', assets: 0,
      ncuaUrl: 'https://mapping.ncua.gov/ResearchCreditUnion',
      ncuaFallback: true, totalCount: 1
    }];
  }
}

// ── Peer Comparison ──────────────────────────────────────────────────────────

async function fetchPeers(inst, history) {
  // Peers = institutions with similar asset size (within ~$1B or 50% range)
  const currentCert = inst.CERT;
  const currentAssets = Number(inst.ASSET); // assets in $thousands from FDIC
  const state = inst.STALP;

  // Define asset band: ±50% or ±$1B (in thousands), whichever is larger
  const bandPct = currentAssets * 0.5;
  const bandFlat = 1_000_000; // $1B in thousands
  const band = Math.max(bandPct, bandFlat);
  const minAssets = Math.max(0, Math.round(currentAssets - band));
  const maxAssets = Math.round(currentAssets + band);

  const fields = 'NAME,CERT,CITY,STALP,ASSET,REPDTE';

  try {
    // First try: same state, similar assets
    let url = `${FDIC_BASE}/institutions?filters=STALP%3A${state}%20AND%20ACTIVE%3A1%20AND%20ASSET%3A%5B${minAssets}%20TO%20${maxAssets}%5D&fields=${fields}&limit=30&sort_by=ASSET&sort_order=DESC`;
    let r = await fetch(url);
    let data = await r.json();
    let peers = (data.data || [])
      .map(d => d.data)
      .filter(d => d.CERT !== currentCert);

    // If fewer than 3, broaden to national same asset range
    if (peers.length < 3) {
      const url2 = `${FDIC_BASE}/institutions?filters=ACTIVE%3A1%20AND%20ASSET%3A%5B${minAssets}%20TO%20${maxAssets}%5D&fields=${fields}&limit=50&sort_by=ASSET&sort_order=DESC`;
      const r2 = await fetch(url2);
      const data2 = await r2.json();
      peers = (data2.data || [])
        .map(d => d.data)
        .filter(d => d.CERT !== currentCert);
    }

    // Pick 5 closest by asset size to current institution
    peers = peers
      .sort((a, b) => Math.abs(Number(a.ASSET) - currentAssets) - Math.abs(Number(b.ASSET) - currentAssets))
      .slice(0, 5);

    // Fetch financials for each peer (ROA, ROE)
    const peersWithFinancials = await Promise.all(peers.map(async (peer) => {
      try {
        const finUrl = `${FDIC_BASE}/financials?filters=CERT%3A${peer.CERT}&fields=ROA,ROE,REPDTE,ASSET&limit=1&sort_by=REPDTE&sort_order=DESC`;
        const fr = await fetch(finUrl);
        const fd = await fr.json();
        const fin = fd.data?.[0]?.data || {};
        return { ...peer, ROA: fin.ROA, ROE: fin.ROE };
      } catch(e) {
        return peer;
      }
    }));

    return peersWithFinancials;
  } catch(e) {
    console.warn('Peer fetch failed:', e);
    return [];
  }
}

// ── CU Peer Comparison ───────────────────────────────────────────────────────

async function fetchCUPeers(cu) {
  const currentId = cu.id || cu.charter;
  const currentAssets = cu.assets || 0;
  const currentState = cu.state;
  if (!currentAssets) return [];

  // Same band logic as banks: ±50% or ±$500M, whichever is larger
  const bandPct = currentAssets * 0.5;
  const bandFlat = 500_000_000; // $500M
  const band = Math.max(bandPct, bandFlat);
  const minAssets = Math.max(0, Math.round(currentAssets - band));
  const maxAssets = Math.round(currentAssets + band);

  try {
    // First try: same state, similar asset range (search broad state term)
    const allCUs = await loadAllCUsInRange(minAssets, maxAssets);
    let statePeers = allCUs.filter(p => p.id !== currentId && p.state === currentState);

    // If fewer than 3, use national peers
    let peers = statePeers.length >= 3 ? statePeers : allCUs.filter(p => p.id !== currentId);

    // Pick 5 closest by asset size
    peers = peers
      .sort((a, b) => Math.abs(a.assets - currentAssets) - Math.abs(b.assets - currentAssets))
      .slice(0, 5);

    return peers;
  } catch(e) {
    console.warn('CU peer fetch failed:', e);
    return [];
  }
}

async function loadAllCUsInRange(minAssets, maxAssets) {
  try {
    const url = `/.netlify/functions/ncua?minAssets=${minAssets}&maxAssets=${maxAssets}&limit=100`;
    const r = await fetch(url);
    const data = await r.json();
    return data.results || [];
  } catch(e) {
    return [];
  }
}

function fmtPeriod(dateStr) {
  // Convert YYYYMMDD or YYYY-MM-DD to MM/YY
  if (!dateStr) return '';
  const s = dateStr.replace(/-/g, '');
  const year = s.slice(2, 4);
  const month = s.slice(4, 6);
  return month + '/' + year;
}

function setPageMeta(view) {
  const m = PAGE_META[view] || PAGE_META.home;
  document.title = m.title;
  document.querySelector('meta[name="description"]')?.setAttribute('content', m.desc);
  document.querySelector('link[rel="canonical"]')?.setAttribute('href', m.canonical);
  document.querySelector('meta[property="og:title"]')?.setAttribute('content', m.title);
  document.querySelector('meta[property="og:description"]')?.setAttribute('content', m.desc);
  document.querySelector('meta[property="og:url"]')?.setAttribute('content', m.canonical);
  document.querySelector('meta[property="og:image"]')?.setAttribute('content', m.image);
  document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', m.title);

  document.querySelector('meta[name="twitter:image"]')?.setAttribute('content', m.image);
}

function navigate(path, view) {
  window.history.pushState({ view }, '', path);
  state.view = view;
  setPageMeta(view);
  render();
  window.scrollTo(0, 0);

function pathToView(path) {
  if (path.startsWith('/industry')) return 'industry';
  if (path.startsWith('/lenders'))  return 'lenders';
  if (path.startsWith('/about'))    return 'about';
  return 'home';
}

function render() {
  const app = document.getElementById('app');
  if (state.view === 'home' || state.view === 'search') app.innerHTML = renderSearch();
  else if (state.view === 'results') app.innerHTML = renderResults();
  else if (state.view === 'detail') app.innerHTML = renderDetail();
  else if (state.view === 'about') app.innerHTML = renderAbout();
  else if (state.view === 'lenders') { app.innerHTML = renderLenders(); setTimeout(initLenders, 50); }
  else if (state.view === 'industry') { app.innerHTML = renderIndustry(); setTimeout(drawIndustryCharts, 50); }
  bindEvents();
  // Draw chart after DOM is updated
  if (state.view === 'detail' && state.detail?.type === 'bank' && state.detail.history) {
    setTimeout(() => {
      renderHistoryChart(state.detail.history);
      const wrap = document.getElementById('historyChartWrap');
      if (wrap && window.ResizeObserver) {
        if (wrap._ro) wrap._ro.disconnect();
        wrap._ro = new ResizeObserver(() => {
          const c = document.getElementById('historyChart');
          if (c?._chartInstance) c._chartInstance.resize();
        });
        wrap._ro.observe(wrap);
      }
    }, 50);
  }
  if (state.view === 'detail' && state.detail?.type === 'cu' && state.detail.raw?.assets) {
    setTimeout(() => {
      renderCUChart(state.detail.raw);
      const wrap = document.getElementById('cuChartWrap');
      if (wrap && window.ResizeObserver) {
        if (wrap._ro) wrap._ro.disconnect();
        wrap._ro = new ResizeObserver(() => {
          const c = document.getElementById('cuChart');
          if (c?._chartInstance) c._chartInstance.resize();
        });
        wrap._ro.observe(wrap);
      }
    }, 50);
    // Load CU peers asynchronously
    const rawCU = state.detail.raw;
    fetchCUPeers(rawCU).then(peers => {
      const container = document.getElementById('cuPeersContainer');
      if (container) container.innerHTML = renderCUPeers(peers, rawCU);

      document.querySelectorAll('#cuPeersContainer .peer-card[data-id]').forEach(card => {

            state: card.dataset.state, charter: card.dataset.id,
          };
          loadCUDetail(card.dataset.id, card.dataset.name, cached);
        });
      });
    });
  }
}

async function loadHomeNews() {
  const el = document.getElementById('homeNewsGrid');
  if (!el) return;
  const q = 'community bank OR "credit union" fintech regulation';
  const innerRss = `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-US&gl=US&ceid=US:en`;
  const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(innerRss)}`;
  try {
    const r = await fetch(apiUrl);
    const data = await r.json();
    if (data.status !== 'ok' || !data.items?.length) {
      el.innerHTML = '<p style="color:var(--muted);font-family:var(--mono);font-size:12px;padding:16px 0;grid-column:1/-1;">No news available right now.</p>';
      return;
    }
    // Sort by date descending (newest first)
    data.items.sort((a, b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));
    const items = data.items.slice(0, 10);
    el.innerHTML = items.map(item => {
      const dashIdx = item.title?.lastIndexOf(' - ') ?? -1;
      const title = dashIdx > 0 ? item.title.slice(0, dashIdx) : item.title;
      const source = dashIdx > 0 ? item.title.slice(dashIdx + 3) : 'News';
      const date = item.pubDate
        ? new Date(item.pubDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        : '';
      return `<a href="${item.link}" target="_blank" rel="noopener" class="home-news-item">
        <div class="home-news-title">${title}</div>
        <div class="home-news-meta">
          <span class="home-news-source">${source}</span>
          <span>${date}</span>
        </div>
      </a>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<p style="color:var(--muted);font-family:var(--mono);font-size:12px;padding:16px 0;grid-column:1/-1;">Could not load news feed.</p>';
  }
}

function generateCUNarrative(cu) {
  const name = cu.name || 'This credit union';
  const assets = cu.assets || 0;
  const members = cu.members || 0;
  const type = cu.type || '';
  const city = cu.city || '';
  const state = cu.state || '';

  if (!assets) return null;

  const assetStr = fmt$(assets);
  const memberStr = members ? fmtNum(members) + ' members' : '';
  const location = city && state ? `based in ${city}, ${state}` : '';
  const assetsPerMember = assets && members ? fmt$(assets / members) : null;

  let narrative = `${name} is a ${type || 'credit union'} ${location}`.trim();
  narrative += ` with ${assetStr} in total assets`;
  if (memberStr) narrative += ` serving ${memberStr}`;
  narrative += '.';
  if (assetsPerMember) narrative += ` Assets per member: ${assetsPerMember}.`;
  return narrative;
}

function bindEvents() {
  document.getElementById('searchBtn')?.addEventListener('click', doSearch);
  document.getElementById('searchInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
  document.getElementById('backBtn')?.addEventListener('click', () => {
    state.view = state.results.length ? 'results' : 'search';
    render();
  });
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.instType = btn.dataset.type;
      render();
    });
  });
  document.querySelectorAll('.result-item').forEach(item => {
    item.addEventListener('click', () => {
      if (item.dataset.type === 'cu') {
        // For CUs, use cached data from search results immediately
        const cached = {
          id: item.dataset.id,
          name: item.dataset.name,
          assets: parseInt(item.dataset.assets || '0', 10),
          members: parseInt(item.dataset.members || '0', 10),
          type: item.dataset.cutype,
          city: item.dataset.city,
          state: item.dataset.state,
          charter: item.dataset.id,
        };
        loadCUDetail(item.dataset.id, item.dataset.name, cached);
      } else {
        loadDetail(item.dataset.id, item.dataset.type);
      }
    });
  });
  document.querySelectorAll('.peer-card[data-id]').forEach(card => {
    card.addEventListener('click', () => loadDetail(card.dataset.id, card.dataset.type));
  });
}

async function doSearch() {
  const q = document.getElementById('searchInput')?.value?.trim();
  if (!q) return;
  // Track search event
  if (window.plausible) plausible('Search', { props: { query: q, type: state.instType } });
  if (window.gtag) gtag('event', 'search', { search_term: q, institution_type: state.instType });
  state.query = q;
  state.loading = true;
  state.error = null;
  state.results = [];
  state.view = 'results';
  render();

  try {
    let results = [];
    if (state.instType === 'bank' || state.instType === 'both') {
      const banks = await searchFDIC(q);
      results = results.concat(banks);
    }
    if (state.instType === 'cu' || state.instType === 'both') {
      try {
        const cus = await searchNCUA(q);
        results = results.concat(cus);
      } catch(e) {
        console.warn('NCUA search failed:', e);
      }
    }
    results.sort((a,b) => (b.assets||0) - (a.assets||0));
    state.results = results;
  } catch(e) {
    state.error = 'Search failed: ' + e.message;
  } finally {
    state.loading = false;
    render();
  }
}

async function loadCUDetail(id, name, cached) {
  state.view = 'detail';
  // Show cached data immediately — no loading spinner needed
  state.detail = { type: 'cu', id, raw: cached };
  render();
  if (window.plausible) plausible('View Institution', { props: { id: String(id), type: 'cu' } });
  // Optionally try to re-fetch by name to get fresher/fuller data
  try {
    const url = `/.netlify/functions/ncua?q=${encodeURIComponent(name || id)}&limit=5`;
    const r = await fetch(url);
    if (r.ok) {
      const data = await r.json();
      const match = (data.results || []).find(x => x.id === id) || data.results?.[0];
      if (match && match.assets) {
        state.detail = { type: 'cu', id, raw: match };
        render();
      }
    }
  } catch(e) { /* keep cached data */ }
}

async function loadDetail(id, type) {
  state.view = 'detail';
  state.detail = null;
  render();
  if (window.plausible) plausible('View Institution', { props: { id: String(id), type } });
  if (window.gtag) gtag('event', 'view_item', { item_id: String(id), item_category: type });
  try {
    if (type === 'bank') {
      const { inst, history } = await getFDICDetail(id);
      const [peers, officers, stock] = await Promise.all([
        fetchPeers(inst, history),
        fetchOfficers(id),
        fetchStockInfo(inst),
      ]);
      state.detail = { type: 'bank', inst, history, peers, officers, stock };
    } else {
      const raw = await getNCUADetail(id);
      state.detail = { type: 'cu', id, raw: raw || { name: id, id } };
    }
  } catch(e) {
    state.detail = { type: 'error', msg: e.message };
  }
  render();
}

async function fetchLeadershipFromClaude(bankName, city, state) {
  // Use Claude claude-sonnet-4-20250514 to look up leadership from public sources
  try {
    const prompt = `You are a financial research assistant. Look up the current CEO and key executives for "${bankName}" in ${city}, ${state}. This is a US community bank.

Return ONLY a JSON array (no markdown, no explanation) with this structure:
[{"name":"Full Name","title":"Title","notes":"Brief note if relevant, else null"}]

Include CEO, President, CFO if known. Limit to 4 people. If you cannot find reliable information, return [].`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!resp.ok) return [];
    const data = await resp.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    if (!clean || clean === '[]') return [];
    return JSON.parse(clean);
  } catch(e) { return []; }
}

async function fetchStockInfo(inst) {
  // Determine if publicly traded via holding company name match
  const hcName = (inst.NAMEHCR || inst.NAME || '').toLowerCase();
  const hcMult = inst.HCTMULT;

  // Try to find ticker from our static map
  let ticker = null;
  for (const [key, sym] of Object.entries(BANK_TICKER_MAP)) {
    if (hcName.includes(key)) { ticker = sym; break; }
  }

  // If no holding company, almost certainly private
  const hasHC = hcMult === 1 || hcMult === '1';
  if (!hasHC) return { status: 'private', ticker: null, price: null, change: null, mktCap: null };

  // If holding company but no ticker match → likely private/OTC
  if (!ticker) return { status: 'private-hc', ticker: null, price: null, change: null, mktCap: null, hcName: inst.NAMEHCR };

  // Fetch live quote from Yahoo Finance (no key needed, CORS-open)
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
    const r = await fetch(url);
    if (!r.ok) return { status: 'public', ticker, price: null, change: null };
    const data = await r.json();
    const meta = data.chart?.result?.[0]?.meta;
    if (!meta) return { status: 'public', ticker, price: null, change: null };
    const price = meta.regularMarketPrice;
    const prev  = meta.chartPreviousClose;
    const change = prev ? ((price - prev) / prev * 100) : null;
    const mktCap = meta.marketCap || null;
    return { status: 'public', ticker, price, change, mktCap };
  } catch(e) {
    return { status: 'public', ticker, price: null, change: null };
  }
}

// ── News Relevance Filter ─────────────────────────────────────────────────────
function decodeInstcat(instcat) {
  // FDIC INSTCAT codes:
  // 1 = Federal Reserve member (state-chartered, not Fed member) — actually:
  // FDIC definitions: 1=National member bank, 2=State member bank, 3=State nonmember bank,
  // 4=Savings institution (Fed member), 5=Savings institution (nonmember),
  // 6=OCC-chartered federal savings bank, 0=other
  // In practice the values vary; map the most common ones:
  const map = {
    '0': { label: 'Other', badge: 'neutral' },
    '1': { label: 'National Member Bank', badge: 'neutral' },
    '2': { label: 'State Member Bank', badge: 'neutral' },
    '3': { label: 'State Non-Member Bank', badge: 'neutral' },
    '4': { label: 'Savings Institution (Fed Member)', badge: 'neutral' },
    '5': { label: 'Savings Institution (Non-Member)', badge: 'neutral' },
    '6': { label: 'Federal Savings Bank', badge: 'neutral' },
    // Broader FDIC INSTCAT values used in BankFind:
    // N = national bank, SM = state member, NM = state nonmember, SA = savings assoc, SB = savings bank
    'N':  { label: 'National Bank', badge: 'neutral' },
    'SM': { label: 'State Member Bank', badge: 'neutral' },
    'NM': { label: 'State Non-Member Bank', badge: 'neutral' },
    'SA': { label: 'Savings Association', badge: 'neutral' },
    'SB': { label: 'Savings Bank', badge: 'neutral' },
    'OI': { label: 'OCC Insured', badge: 'neutral' },
  };
  const key = String(instcat ?? '').trim();
  return map[key] || { label: key || '—', badge: 'neutral' };
}

// HCTMULT: 1 = part of a bank holding company (often publicly traded parent possible)
// SC field: stock charter indicator. We derive public/private from HCTMULT + NAMEHCR
function getOwnershipLabel(inst) {
  if (!inst) return null;
  const hc = inst.HCTMULT;
  const hcName = inst.NAMEHCR;
  if (hc === 1 || hc === '1') {
    return hcName ? `Holding Company: ${hcName}` : 'Part of Bank Holding Company';
  }
  if (hc === 0 || hc === '0') return 'Independent (No Holding Company)';
  return null;
}

// ── Recent News ───────────────────────────────────────────────────────────────
async function fetchNews(institutionName, city, state) {
  // Google News RSS via rss2json.com proxy (CORS-open, free tier 10k req/day)
  // Key fixes vs prior version:
  //   1. Inner RSS URL must be double-encoded (encodeURIComponent of full URL)
  //   2. `count` param requires paid key — omit it (free returns 10, we slice 5)
  //   3. Include city+state for relevance; filter obvious non-matches by name
  //   4. Source extracted from title suffix "- Source Name" since author is blank

  // Build query: exact name + city + state for strong geographic signal
  // Falls back to name-only if city/state broaden to 0 results
  const queries = city && state
    ? [`"${institutionName}" ${city} ${state}`, `"${institutionName}"`]
    : [`"${institutionName}"`];

  for (const q of queries) {
    try {
      const innerRss = `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-US&gl=US&ceid=US:en`;
      const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(innerRss)}`;
      const r = await fetch(apiUrl);
      if (!r.ok) continue;
      const data = await r.json();
      if (data.status !== 'ok' || !data.items?.length) continue;

      const cutoff = new Date();
      cutoff.setMonth(cutoff.getMonth() - 18);
      // Filter out generic words that match too broadly
      const stopWords = new Set(['bank', 'national', 'federal', 'savings', 'trust', 'community', 'first', 'state', 'the', 'and', 'of']);
      const nameWords = institutionName.toLowerCase().split(/\s+/).filter(w => w.length > 2 && !stopWords.has(w));
      // If all words are stop words (e.g. "First National Bank"), fall back to full name match
      const fullName = institutionName.toLowerCase();

      const relevant = data.items.filter(item => {
        const t = item.title?.toLowerCase() || '';
        const pubDate = item.pubDate ? new Date(item.pubDate) : null;
        const fresh = !pubDate || pubDate >= cutoff;
        // Require either a meaningful unique word match OR the full institution name
        const nameMatch = nameWords.length > 0
          ? nameWords.some(w => t.includes(w))
          : t.includes(fullName);
        return fresh && nameMatch;
      });

      const pool = relevant.length >= 2 ? relevant : data.items;

      // Sort by date descending (newest first) before slicing
      pool.sort((a, b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));

      return pool.slice(0, 10).map(item => {
        // Extract source from "Title - Source Name" suffix
        const dashIdx = item.title?.lastIndexOf(' - ') ?? -1;
        const title = dashIdx > 0 ? item.title.slice(0, dashIdx) : item.title;
        const source = dashIdx > 0 ? item.title.slice(dashIdx + 3) : 'News';
        // Format date: pubDate is "YYYY-MM-DD HH:MM:SS"
        const date = item.pubDate
          ? new Date(item.pubDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
          : '';
        return { title, source, url: item.link, date };
      });
    } catch(e) { continue; }
  }
  return [];
}

function renderNewsSection(name, city, state) {
  // Renders placeholder immediately; fills async so it doesn't block page paint
  setTimeout(async () => {
    const el = document.getElementById('newsContainer');

    if (!articles.length) {

          <span class="news-source">${a.source}</span>

  }, 0);
  return `<div class="news-section">

}

// Lender scoring weights by loan type
const LENDER_WEIGHTS = {
  residential: { loanConc: 'LNLSRES',  label: 'Residential RE' },
  commercial:  { loanConc: 'LNLSRE',   label: 'Commercial RE' },
  smallbiz:    { loanConc: 'LNCI',      label: 'C&I Loans' },
  consumer:    { loanConc: 'LNCON',     label: 'Consumer' },
};

function initLenders() {
  // Auto-run with community banks default
  runLenderSearch();
}

async function runLenderSearch() {
  const el = document.getElementById('lenderResults');
  if (!el) return;
  el.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:40px 0;justify-content:center;color:var(--muted);font-family:var(--mono);font-size:13px;"><div class="spinner"></div>Loading lender data…</div>';

  const searchTerm  = (document.getElementById('lenderSearch')?.value || '').trim();
  const stateVal    = document.getElementById('lenderState')?.value || '';
  const loanType    = document.getElementById('lenderLoanType')?.value || 'residential';
  const assetSize   = document.getElementById('lenderAssetSize')?.value || 'community';

  // Asset range
  const assetRanges = {
    community: [0,       1000000],
    regional:  [1000000, 10000000],
    large:     [10000000,9999999999],
    all:       [0,       9999999999],
  };
  const [minA, maxA] = assetRanges[assetSize] || assetRanges.all;

  try {
    let certSet = null; // null = no restriction, Set = restrict to these CERTs

    // If name/city search provided — query institutions endpoint first to get matching CERTs
    if (searchTerm) {
      const instFields = 'NAME,CERT,CITY,STALP,ASSET,ACTIVE';
      const q = searchTerm.trim();
      const firstWord = q.split(/\s+/)[0];

      // Cast a wide net — wildcard on first word + fulltext + city, all in parallel
      const [wcR, ftR, cityR] = await Promise.all([
        fetch(`${FDIC_BASE}/institutions?filters=NAME%3A${encodeURIComponent(firstWord)}*%20AND%20ACTIVE%3A1&fields=${instFields}&limit=100&sort_by=ASSET&sort_order=DESC`),
        fetch(`${FDIC_BASE}/institutions?search=${encodeURIComponent(q)}&fields=${instFields}&limit=50&sort_by=ASSET&sort_order=DESC&filters=ACTIVE%3A1`),
        fetch(`${FDIC_BASE}/institutions?filters=CITY%3A${encodeURIComponent(q)}*%20AND%20ACTIVE%3A1&fields=${instFields}&limit=100&sort_by=ASSET&sort_order=DESC`),
      ]);
      const [wcData, ftData, cityData] = await Promise.all([wcR.json(), ftR.json(), cityR.json()]);

      // Merge all results, dedupe by CERT
      const all = [
        ...(wcData.data   || []).map(d => d.data),
        ...(ftData.data   || []).map(d => d.data),
        ...(cityData.data || []).map(d => d.data),
      ].filter(Boolean);
      const seenCerts = new Set();
      const merged = all.filter(i => {
        if (seenCerts.has(i.CERT)) return false;
        seenCerts.add(i.CERT);
        return true;
      });

      // Re-rank client-side with fuzzyScore — same logic as home page search
      const scored = merged
        .map(i => ({
          inst: i,
          score: Math.max(
            fuzzyScore(i.NAME || '', q),
            fuzzyScore(i.CITY || '', q)
          )
        }))
        .filter(({ score }) => score >= 30)
        .sort((a, b) => b.score - a.score);

      if (!scored.length) {
        el.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:13px;padding:40px 0;text-align:center;">No institutions found matching that name or city. Try a broader search.</div>';
        return;
      }
      certSet = new Map(scored.map(({ inst }) => [inst.CERT, inst]));
    }

    // Build financials query
    const finFields = 'CERT,ASSET,DEP,LNLSRES,LNLSRE,LNCI,LNCON,LNLSNET,RBC1AAJ,ROA,LNLSDEPR,NIMY,REPDTE';
    let filters;

    if (certSet) {
      // Fetch financials for specific CERTs — batch by CERT list
      const certs = [...certSet.keys()].slice(0, 100);
      const certFilter = certs.map(c => `CERT%3A${c}`).join('%20OR%20');
      filters = `(${certFilter})`;
    } else {
      filters = `ACTIVE%3A1%20AND%20ASSET%3A%5B${minA}%20TO%20${maxA}%5D`;
      if (stateVal) filters += `%20AND%20STALP%3A${stateVal}`;
    }

    const url = `${FDIC_BASE}/financials?filters=${filters}&fields=${finFields}&limit=500&sort_by=REPDTE&sort_order=DESC`;
    const r = await fetch(url);
    const data = await r.json();
    const rows = (data.data || []).map(d => d.data).filter(Boolean);

    // Deduplicate by CERT — keep most recent quarter only
    const seen = new Set();
    const unique = rows.filter(r => {
      if (seen.has(r.CERT)) return false;
      seen.add(r.CERT);
      return true;
    });

    // Enrich with institution name/city from certSet if we did a name search
    // otherwise fetch names from institutions endpoint for display
    let enriched = unique;
    if (certSet) {
      enriched = unique.map(r => ({
        ...r,
        NAME: certSet.get(r.CERT)?.NAME || r.CERT,
        CITY: certSet.get(r.CERT)?.CITY || '',
        STALP: certSet.get(r.CERT)?.STALP || '',
        ASSET: certSet.get(r.CERT)?.ASSET || r.ASSET,
      }));
    } else {
      // For dropdown-only searches, fetch institution names in parallel
      const certList = unique.map(r => r.CERT).slice(0, 100);
      const certFilter2 = certList.map(c => `CERT%3A${c}`).join('%20OR%20');
      try {
        const instR = await fetch(`${FDIC_BASE}/institutions?filters=(${certFilter2})&fields=CERT,NAME,CITY,STALP&limit=100`);
        const instData = await instR.json();
        const instMap = new Map((instData.data || []).map(d => [d.data?.CERT, d.data]));
        enriched = unique.map(r => ({
          ...r,
          NAME: instMap.get(r.CERT)?.NAME || `CERT ${r.CERT}`,
          CITY: instMap.get(r.CERT)?.CITY || '',
          STALP: instMap.get(r.CERT)?.STALP || '',
        }));
      } catch(e) { /* use raw data if inst lookup fails */ }
    }
    if (!enriched.length) {
      el.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:13px;padding:40px 0;text-align:center;">No results found. Try adjusting your search or filters.</div>';
      return;
    }

    // Score each institution
    const loanField = LENDER_WEIGHTS[loanType]?.loanConc;
    const scored = enriched.map(r => {
      const assets      = Number(r.ASSET) || 1;
      const loanConc    = loanField ? (Number(r[loanField]) || 0) / assets * 100 : 0;
      const totalLoans  = (Number(r.LNLSNET) || 0) / assets * 100;
      const capital     = Number(r.RBC1AAJ) || 0;
      const roa         = Number(r.ROA) || 0;
      const delinq      = Number(r.LNLSDEPR) || 0;
      const nim         = Number(r.NIMY) || 0;

      // Composite lending score (0–100)
      // Weights: loan concentration 35%, capital strength 20%, asset quality 25%, profitability 20%
      const concScore    = Math.min(loanConc * 2, 40) * (35/40);
      const capScore     = Math.min(Math.max(capital - 8, 0) * 4, 20);
      const qualScore    = Math.max(25 - delinq * 5, 0);
      const profScore    = Math.min(Math.max(roa * 10, 0), 20);
      const score        = Math.round(concScore + capScore + qualScore + profScore);

      return { ...r, loanConc, totalLoans, capital, roa, delinq, nim, score };
    });

    // Sort by score desc
    scored.sort((a, b) => b.score - a.score);
    const top = scored.slice(0, 50);

    const loanLabel = LENDER_WEIGHTS[loanType]?.label || 'Loans';

    el.innerHTML = `
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:12px;">
        Showing top ${top.length} lenders${searchTerm ? ` matching "${searchTerm}"` : ''}${stateVal ? ` in ${stateVal}` : ''} · Sorted by Lending Score · ${loanLabel} focus
      </div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="border-bottom:1px solid var(--border);">
              <th style="text-align:left;padding:10px 12px;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;">#</th>
              <th style="text-align:left;padding:10px 12px;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;">Institution</th>
              <th style="text-align:left;padding:10px 12px;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;">Location</th>
              <th style="text-align:right;padding:10px 12px;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;">Lending Score</th>
              <th style="text-align:right;padding:10px 12px;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;">${loanLabel} %</th>
              <th style="text-align:right;padding:10px 12px;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;">Capital Ratio</th>
              <th style="text-align:right;padding:10px 12px;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;">ROA</th>
              <th style="text-align:right;padding:10px 12px;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;">Assets</th>
              <th style="text-align:right;padding:10px 12px;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;">Delinq %</th>
            </tr>
          </thead>
          <tbody>
            ${top.map((b, i) => {
              const scoreColor = b.score >= 70 ? '#4ade80' : b.score >= 45 ? '#fbbf24' : '#f87171';
              const delinqColor = b.delinq <= 1 ? '#4ade80' : b.delinq <= 3 ? '#fbbf24' : '#f87171';
              const roaColor = b.roa >= 1 ? '#4ade80' : b.roa >= 0 ? '#fbbf24' : '#f87171';
              return `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background 0.15s;" 
                onmouseover="this.style.background='rgba(77,184,255,0.05)'"

              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
      <div style="margin-top:16px;font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.8;">
        <strong style="color:var(--text);">Lending Score methodology:</strong> Composite of loan concentration (35%), capital strength (20%), asset quality / delinquency rate (25%), and ROA profitability (20%).
        Click any row to view full institution profile. Data as of most recent FDIC call report.
      </div>`;
  } catch(e) {
    el.innerHTML = `<div style="color:#f87171;font-family:var(--mono);font-size:13px;padding:20px 0;">Error loading data: ${e.message}</div>`;
  }
}

// Fetch live FDIC aggregate data — merges with hardcoded history
async function fetchLiveFDICAggregate() {
  try {
    const fields = 'REPDTE,PROBNUM,PROBASS,NIMY,ROA,ROE,ASSET,DEP';
    // Get last 8 quarters of aggregate data
    const url = `${FDIC_BASE}/summary?fields=${fields}&limit=8&sort_by=REPDTE&sort_order=DESC&filters=REPDTE%3A%5B20220101%20TO%2099999999%5D`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    return (data.data || []).map(d => d.data).filter(Boolean);
  } catch(e) {
    return null;
  }
}

function drawIndustryCharts() {
  if (typeof Chart === 'undefined') {
    setTimeout(drawIndustryCharts, 200);
    return;
  }

  const gridColor = 'rgba(255,255,255,0.08)';
  const tickColor = 'rgba(255,255,255,0.45)';
  const tip = {
    backgroundColor: 'rgba(15,18,64,0.97)',
    borderColor: 'rgba(77,184,255,0.3)',
    borderWidth: 1,
    titleColor: '#ffffff',
    bodyColor: 'rgba(255,255,255,0.7)',
    titleFont: { family: 'DM Mono, monospace', size: 12 },
    bodyFont: { family: 'DM Mono, monospace', size: 11 },
    padding: 12,
    callbacks: {
      title: (items) => {
        const yr = parseInt(items[0]?.label);
        return INDUSTRY_EVENTS[yr] ? `${yr}  ·  ${INDUSTRY_EVENTS[yr]}` : String(yr);
      }
    }
  };
  const xScale = { grid:{color:gridColor}, ticks:{color:tickColor,font:{size:10},maxTicksLimit:12}, border:{color:'rgba(255,255,255,0.1)'} };
  const yScale = { grid:{color:gridColor}, ticks:{color:tickColor,font:{size:10}}, border:{color:'rgba(255,255,255,0.1)'} };

  function makeChart(id, config) {
    const el = document.getElementById(id);
    if (!el) return;
    if (el._chart) el._chart.destroy();
    el._chart = new Chart(el, config);
    const wrap = el.parentElement;
    if (wrap && window.ResizeObserver) {
      if (wrap._ro) wrap._ro.disconnect();
      wrap._ro = new ResizeObserver(() => { if (el._chart) el._chart.resize(); });
      wrap._ro.observe(wrap);
    }
  }

  // ── 1. New Charters ────────────────────────────────────────────────────────
  const cYrs = Object.keys(FDIC_NEW_CHARTERS).map(Number).sort((a,b)=>a-b);
  makeChart('charterChart', {
    type:'bar',
    data:{ labels:cYrs, datasets:[{
      data:cYrs.map(y=>FDIC_NEW_CHARTERS[y]),
      backgroundColor:cYrs.map(y=>y>=2008?'rgba(176,110,243,0.75)':y>=1985&&y<=1992?'rgba(255,107,107,0.75)':'rgba(77,184,255,0.65)'),
      borderColor:'transparent', borderRadius:2
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false}, tooltip:{...tip, callbacks:{...tip.callbacks, label:c=>` New charters: ${c.parsed.y}`}} },
      scales:{ x:xScale, y:yScale }
    }
  });

  // ── 2. Failures ────────────────────────────────────────────────────────────
  const fYrs = Object.keys(FDIC_FAILURES).map(Number).sort((a,b)=>a-b);
  makeChart('failureChart', {
    type:'bar',
    data:{ labels:fYrs, datasets:[{
      data:fYrs.map(y=>FDIC_FAILURES[y]),
      backgroundColor:fYrs.map(y=>y>=2008&&y<=2013?'rgba(176,110,243,0.75)':y>=1985&&y<=1992?'rgba(255,107,107,0.75)':'rgba(77,184,255,0.55)'),
      borderColor:'transparent', borderRadius:2
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false}, tooltip:{...tip, callbacks:{...tip.callbacks, label:c=>` Failures: ${c.parsed.y}`}} },
      scales:{ x:xScale, y:yScale }
    }
  });

  // ── 3. Active Banks ────────────────────────────────────────────────────────
  const aYrs = Object.keys(FDIC_ACTIVE_BANKS).map(Number).sort((a,b)=>a-b);
  makeChart('activeChart', {
    type:'line',
    data:{ labels:aYrs, datasets:[{
      data:aYrs.map(y=>FDIC_ACTIVE_BANKS[y]),
      borderColor:'#4db8ff', backgroundColor:'rgba(77,184,255,0.07)',
      borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#4db8ff', tension:0.3, fill:true
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false}, tooltip:{...tip, callbacks:{...tip.callbacks, label:c=>` Active banks: ${c.parsed.y.toLocaleString()}`}} },
      scales:{ x:xScale, y:{...yScale, ticks:{...yScale.ticks, callback:v=>v.toLocaleString()}} }
    }
  });

  // ── 4. Branch Avg by Tier (horizontal bar) ─────────────────────────────────
  const tierColors = ['rgba(77,184,255,0.75)','rgba(100,160,255,0.7)','rgba(61,220,151,0.7)','rgba(251,191,36,0.7)','rgba(176,110,243,0.7)'];
  makeChart('tierAvgChart', {
    type:'bar',
    data:{ labels:FDIC_BRANCH_TIERS.labels, datasets:[{
      data:FDIC_BRANCH_TIERS.avg,
      backgroundColor:tierColors, borderColor:'transparent', borderRadius:4, indexAxis:'y'
    }]},
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ ...tip, callbacks:{ title:()=>'', label:c=>` Avg branches: ${c.parsed.x.toLocaleString()}  (${FDIC_BRANCH_TIERS.banks[c.dataIndex].toLocaleString()} banks)` }} },
      scales:{ x:{...xScale, ticks:{...xScale.ticks, callback:v=>v.toLocaleString()}}, y:{...yScale, ticks:{...yScale.ticks, font:{size:11}}} }
    }
  });

  // ── 5. Branch Total by Tier (donut) ────────────────────────────────────────
  makeChart('tierTotalChart', {
    type:'doughnut',
    data:{ labels:FDIC_BRANCH_TIERS.labels, datasets:[{
      data:FDIC_BRANCH_TIERS.total,
      backgroundColor:tierColors, borderColor:'rgba(15,18,64,0.8)', borderWidth:2, hoverOffset:6
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom', labels:{color:'rgba(255,255,255,0.5)',font:{size:10},boxWidth:10,padding:8} },
        tooltip:{ ...tip, callbacks:{ title:()=>'', label:c=>` ${c.label}: ${c.parsed.toLocaleString()} (${Math.round(c.parsed/78311*100)}%)` }} }
    }
  });

  // ── 6. Top States (vertical bar) ──────────────────────────────────────────
  makeChart('stateChart', {
    type:'bar',
    data:{ labels:FDIC_BRANCH_STATES.states, datasets:[{
      data:FDIC_BRANCH_STATES.branches,
      backgroundColor:'rgba(61,220,151,0.65)', borderColor:'#3ddc97', borderWidth:1.5, borderRadius:3
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ ...tip, callbacks:{ title:()=>'', label:c=>` ${c.label}: ${c.parsed.y.toLocaleString()} branches` }} },
      scales:{ x:xScale, y:{...yScale, ticks:{...yScale.ticks, callback:v=>v.toLocaleString()}} }
    }
  });

  // ── 7. Total Deposits ──────────────────────────────────────────────────────
  const dYrs = Object.keys(FDIC_DEPOSITS).map(Number).sort((a,b)=>a-b);
  makeChart('depositChart', {
    type:'line',
    data:{ labels:dYrs, datasets:[{
      data:dYrs.map(y=>FDIC_DEPOSITS[y]),
      borderColor:'#b06ef3', backgroundColor:'rgba(176,110,243,0.07)',
      borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#b06ef3', tension:0.3, fill:true
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false}, tooltip:{...tip, callbacks:{...tip.callbacks, label:c=>` Deposits: $${c.parsed.y.toLocaleString()}B`}} },
      scales:{ x:xScale, y:{...yScale, ticks:{...yScale.ticks, callback:v=>'$'+(v/1000).toFixed(0)+'T'}} }
    }
  });

  // ── 8. Real Estate Loans ───────────────────────────────────────────────────
  const rYrs = Object.keys(FDIC_RE_LOANS).map(Number).sort((a,b)=>a-b);
  makeChart('reLoanChart', {
    type:'line',
    data:{ labels:rYrs, datasets:[{
      data:rYrs.map(y=>FDIC_RE_LOANS[y]),
      borderColor:'#fbbf24', backgroundColor:'rgba(251,191,36,0.07)',
      borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#fbbf24', tension:0.3, fill:true
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false}, tooltip:{...tip, callbacks:{...tip.callbacks, label:c=>` RE loans: $${c.parsed.y.toLocaleString()}B`}} },
      scales:{ x:xScale, y:{...yScale, ticks:{...yScale.ticks, callback:v=>'$'+v.toLocaleString()+'B'}} }
    }
  });

  // ── 9–11. Live charts — fetch FDIC aggregate then draw ────────────────────
  fetchLiveFDICAggregate().then(liveRows => {

    // Build a year→value map from live quarterly data (use most recent quarter per year)
    const liveByYear = {};
    if (liveRows) {
      liveRows.forEach(row => {
        const yr = parseInt(String(row.REPDTE || '').slice(0, 4));
        if (!yr) return;
        if (!liveByYear[yr] || row.REPDTE > liveByYear[yr].REPDTE) liveByYear[yr] = row;
      });
    }

    // Helper: merge hardcoded history with live data (live wins for recent years)
    function mergeData(historical, liveKey, scale = 1) {
      const merged = { ...historical };
      Object.entries(liveByYear).forEach(([yr, row]) => {
        const val = parseFloat(row[liveKey]);
        if (!isNaN(val)) merged[parseInt(yr)] = +(val * scale).toFixed(2);
      });
      return merged;
    }

    // Tag elements as live if we got data
    const liveTag = liveRows ? '● LIVE' : '';
    const tagEl = (id) => { const el = document.getElementById(id); if (el) el.textContent = liveTag; };
    tagEl('problemLiveTag');
    tagEl('nimLiveTag');
    tagEl('roaLiveTag');

    // ── 9. Problem Banks ────────────────────────────────────────────────────
    const probData = mergeData(FDIC_PROBLEM_BANKS, 'PROBNUM');
    const probYrs  = Object.keys(probData).map(Number).sort((a,b)=>a-b);
    const latestProb = probData[probYrs[probYrs.length - 1]];
    makeChart('problemChart', {
      type: 'bar',
      data: { labels: probYrs, datasets: [{
        data: probYrs.map(y => probData[y]),
        backgroundColor: probYrs.map(y => probData[y] >= 500 ? 'rgba(248,113,113,0.7)' : probData[y] >= 100 ? 'rgba(251,191,36,0.6)' : 'rgba(74,222,128,0.5)'),
        borderColor:     probYrs.map(y => probData[y] >= 500 ? '#f87171' : probData[y] >= 100 ? '#fbbf24' : '#4ade80'),
        borderWidth: 1, borderRadius: 3,
      }]},
      options: { responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false },
          tooltip: { ...tip, callbacks: { ...tip.callbacks, label: c => ` Problem banks: ${c.parsed.y.toLocaleString()}` } },
          annotation: { annotations: {
            threshold: { type:'line', yMin:100, yMax:100, borderColor:'rgba(251,191,36,0.4)', borderWidth:1, borderDash:[4,4] }
          }}
        },
        scales: { x: xScale, y: { ...yScale, ticks: { ...yScale.ticks, callback: v => v.toLocaleString() } } }
      }
    });

    // ── 10. Net Interest Margin ─────────────────────────────────────────────
    const nimData = mergeData(FDIC_INDUSTRY_NIM, 'NIMY');
    const nimYrs  = Object.keys(nimData).map(Number).sort((a,b)=>a-b);
    makeChart('nimChart', {
      type: 'line',
      data: { labels: nimYrs, datasets: [{
        data: nimYrs.map(y => nimData[y]),
        borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.07)',
        borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: '#4ade80', tension: 0.3, fill: true
      }]},
      options: { responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false },
          tooltip: { ...tip, callbacks: { ...tip.callbacks, label: c => ` NIM: ${c.parsed.y.toFixed(2)}%` } }
        },
        scales: { x: xScale, y: { ...yScale, ticks: { ...yScale.ticks, callback: v => v.toFixed(1) + '%' } } }
      }
    });

    // ── 11. ROA & ROE ───────────────────────────────────────────────────────
    const roaData = mergeData(FDIC_INDUSTRY_ROA, 'ROA');
    const roeData = mergeData(FDIC_INDUSTRY_ROE, 'ROE');
    const roaYrs  = Object.keys(roaData).map(Number).sort((a,b)=>a-b);
    makeChart('roaChart', {
      type: 'line',
      data: { labels: roaYrs, datasets: [
        { label: 'ROA', data: roaYrs.map(y => roaData[y]),
          borderColor: '#4db8ff', backgroundColor: 'rgba(77,184,255,0.07)',
          borderWidth: 2.5, pointRadius: 3, tension: 0.3, fill: false, yAxisID: 'yRoa' },
        { label: 'ROE', data: roaYrs.map(y => roeData[y]),
          borderColor: '#b06ef3', backgroundColor: 'rgba(176,110,243,0.07)',
          borderWidth: 2.5, pointRadius: 3, tension: 0.3, fill: false, yAxisID: 'yRoe', borderDash: [5,3] },
      ]},
      options: { responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: true, position: 'top',
          labels: { color: tickColor, font: { size: 11, family: 'DM Mono, monospace' }, boxWidth: 16, padding: 16 }
        },
          tooltip: { ...tip, callbacks: { title: tip.callbacks.title,
            label: c => c.datasetIndex === 0 ? ` ROA: ${c.parsed.y.toFixed(2)}%` : ` ROE: ${c.parsed.y.toFixed(1)}%`
          }}
        },
        scales: {
          x: xScale,
          yRoa: { ...yScale, position: 'left',  ticks: { ...yScale.ticks, callback: v => v.toFixed(1) + '%' } },
          yRoe: { ...yScale, position: 'right', ticks: { ...yScale.ticks, callback: v => v.toFixed(0) + '%' }, grid: { display: false } },
        }
      }
    });
  });
}

            <input class="lead-input" id="lead_name" type="text" placeholder="Your name" />
            <input class="lead-input" id="lead_email" type="email" placeholder="Work email" />
          </div>
          <div class="lead-row">
            <input class="lead-input" id="lead_institution" type="text" placeholder="Institution / Company" />
            <select class="lead-select" id="lead_role">
              <option value="">Role / Title…</option>
              <option>CEO / President</option>
              <option>CFO / Finance</option>
              <option>CTO / Technology</option>
              <option>COO / Operations</option>
              <option>Analyst / Data</option>
              <option>Sales / BD</option>
              <option>Consultant</option>
              <option>Other</option>
            </select>
          </div>
          <div class="lead-row">
            <textarea class="lead-input lead-textarea" id="lead_feedback" placeholder="Feature request or feedback (optional)…" rows="3" style="resize:vertical;min-height:72px;font-family:inherit;font-size:14px;"></textarea>
          </div>
          <button class="lead-submit" id="leadSubmit" onclick="submitLead()">Send →</button>
        </div>
      `}
    </div>
  `;
}

async function submitLead() {
  const name = document.getElementById('lead_name')?.value?.trim();
  const email = document.getElementById('lead_email')?.value?.trim();
  const institution = document.getElementById('lead_institution')?.value?.trim();
  const role = document.getElementById('lead_role')?.value;
  const feedback = document.getElementById('lead_feedback')?.value?.trim();

  if (!name || !email) {
    document.getElementById('lead_name').style.borderColor = name ? 'var(--border)' : 'var(--red)';
    document.getElementById('lead_email').style.borderColor = email ? 'var(--border)' : 'var(--red)';
    return;
  }

  // Disable button during submit
  const btn = document.getElementById('leadSubmit');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }

  // Submit to Netlify Function
  try {
    const body = new URLSearchParams({ name, email,
      institution: institution || '', role: role || '', feedback: feedback || '' });
    await fetch('/.netlify/functions/submit-lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body.toString()
    });
  } catch(e) {
    console.warn('Netlify form submit error:', e);
  }

  // Also save locally as backup
  const leads = JSON.parse(localStorage.getItem('vaultbot_leads') || '[]');
  leads.push({ name, email, institution, role, feedback, ts: new Date().toISOString() });
  localStorage.setItem('vaultbot_leads', JSON.stringify(leads));
  if (window.gtag) gtag('event', 'generate_lead', { method: 'about_form' });
  sessionStorage.setItem('vaultbot_submitted', '1');

  // Fire Plausible event if available
  if (window.plausible) plausible('Lead Captured', { props: { role: role || 'unknown', institution: institution || 'unknown' } });

  // Re-render to show success state
  render();
}

// ── Footer scroll blur ───────────────────────────────────────────────────────
(function() {
  // Strip any lingering inline background from old deploys
  const f = document.getElementById('siteFooter');
  if (f) f.style.removeProperty('background');

  let ticking = false;
  window.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() {
        const footer = document.getElementById('siteFooter');
        if (footer) {
          if (window.scrollY > 40) {
            footer.classList.add('scrolled');
          } else {
            footer.classList.remove('scrolled');
          }
        }
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
})();

// ── Init ──────────────────────────────────────────────────────────────────────
// Boot from URL path
const _bootView = pathToView(location.pathname);
state.view = _bootView;
setPageMeta(_bootView);
if (_bootView === 'industry') {
  render();
  setTimeout(drawIndustryCharts, 100);
} else {
  render();
}
</script>
