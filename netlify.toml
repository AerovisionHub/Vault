[build]
  publish = "."
  functions = "functions"

# SPA routing
[[redirects]]
  from = "/industry"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
