[build]
  publish = "."
  functions = "functions"

# SPA routing — send all paths to index.html
[[redirects]]
  from = "/industry"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/lenders"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/charters"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/ma"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/bank/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/cu/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/search-test"
  to = "/search-test.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
